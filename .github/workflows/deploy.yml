name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git remote add hf https://ayankandar2:${HF_TOKEN}@huggingface.co/spaces/ayankandar2/manga-colorizer-bot || true
          git push hf main --force
          echo "✅ Deployed to HF Spaces!"

  run-bot:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Confirm deployment
        run: echo "Bot deployed to https://huggingface.co/spaces/ayankandar2/manga-colorizer-bot"
